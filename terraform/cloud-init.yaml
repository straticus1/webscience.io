#cloud-config

package_update: true
package_upgrade: true

packages:
  - python39
  - python39-pip
  - git
  - nginx
  - certbot
  - firewalld

write_files:
  - path: /opt/webscience/.env
    permissions: '0600'
    content: |
      FLASK_ENV=production
      SECRET_KEY=$(openssl rand -hex 32)

  - path: /etc/systemd/system/webscience.service
    permissions: '0644'
    content: |
      [Unit]
      Description=WebScience.io Flask Application
      After=network.target

      [Service]
      User=webscience
      Group=webscience
      WorkingDirectory=/opt/webscience
      Environment="PATH=/opt/webscience/venv/bin"
      EnvironmentFile=/opt/webscience/.env
      ExecStart=/opt/webscience/venv/bin/gunicorn --workers 4 --bind 127.0.0.1:5003 app:app
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /etc/nginx/conf.d/webscience.conf
    permissions: '0644'
    content: |
      # Cloudflare real IP restoration
      set_real_ip_from 103.21.244.0/22;
      set_real_ip_from 103.22.200.0/22;
      set_real_ip_from 103.31.4.0/22;
      set_real_ip_from 104.16.0.0/13;
      set_real_ip_from 104.24.0.0/14;
      set_real_ip_from 108.162.192.0/18;
      set_real_ip_from 131.0.72.0/22;
      set_real_ip_from 141.101.64.0/18;
      set_real_ip_from 162.158.0.0/15;
      set_real_ip_from 172.64.0.0/13;
      set_real_ip_from 173.245.48.0/20;
      set_real_ip_from 188.114.96.0/20;
      set_real_ip_from 190.93.240.0/20;
      set_real_ip_from 197.234.240.0/22;
      set_real_ip_from 198.41.128.0/17;
      set_real_ip_from 2400:cb00::/32;
      set_real_ip_from 2606:4700::/32;
      set_real_ip_from 2803:f800::/32;
      set_real_ip_from 2405:b500::/32;
      set_real_ip_from 2405:8100::/32;
      set_real_ip_from 2c0f:f248::/32;
      set_real_ip_from 2a06:98c0::/29;
      real_ip_header CF-Connecting-IP;

      server {
          listen 80;
          server_name ${domain} www.${domain};

          location / {
              proxy_pass http://127.0.0.1:5003;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_connect_timeout 30s;
              proxy_read_timeout 60s;
          }

          location /health {
              proxy_pass http://127.0.0.1:5003/health;
          }
      }

runcmd:
  # Create user
  - useradd -r -s /bin/false webscience

  # Clone repository
  - git clone https://github.com/afterdarksys/webscience.io.git /opt/webscience

  # Setup Python environment
  - cd /opt/webscience && python3.9 -m venv venv
  - /opt/webscience/venv/bin/pip install --upgrade pip
  - /opt/webscience/venv/bin/pip install flask flask-cors gunicorn requests

  # Set permissions
  - chown -R webscience:webscience /opt/webscience

  # Configure firewall
  - systemctl enable firewalld
  - systemctl start firewalld
  - firewall-cmd --permanent --add-service=http
  - firewall-cmd --permanent --add-service=https
  - firewall-cmd --permanent --add-port=5003/tcp
  - firewall-cmd --reload

  # Enable services
  - systemctl daemon-reload
  - systemctl enable nginx
  - systemctl enable webscience
  - systemctl start nginx
  - systemctl start webscience
